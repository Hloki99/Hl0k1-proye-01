<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Local de Gestión de Facturas</title>
     <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="css/estilos.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-gray-800 min-h-screen relative overflow-x-hidden">

    <div class="fixed bottom-6 right-6 z-40 flex flex-col gap-3">
        <button onclick="toggleDrawer('drawer-usuarios')" class="bg-slate-800 hover:bg-slate-900 text-white p-4 rounded-full shadow-2xl transition-all transform hover:scale-110 cursor-pointer flex items-center justify-center group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
            </svg>
        </button>
        <button onclick="toggleDrawer('drawer-comparar')" class="bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-full shadow-2xl transition-all transform hover:scale-110 cursor-pointer flex items-center justify-center group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 14l2-2 4 4m0-7l-2.5 2.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </button>
        <button onclick="toggleDrawer('drawer-importar')" class="bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-full shadow-2xl transition-all transform hover:scale-110 cursor-pointer flex items-center justify-center group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
            </svg>
        </button>
    </div>

    <div id="drawer-overlay" onclick="cerrarTodosLosDrawers()" class="fixed inset-0 bg-black/40 z-30 hidden opacity-0 transition-opacity duration-300"></div>

    <div id="drawer-usuarios" class="fixed top-0 left-0 h-full w-full sm:w-105 bg-white z-50 shadow-2xl -translate-x-full transition-transform duration-300 overflow-y-auto border-r border-slate-100 p-6 flex flex-col">
        <div class="flex justify-between items-center border-b pb-3 mb-4">
            <h2 class="text-xl font-extrabold text-slate-800">👤 Control de Personal</h2>
            <button onclick="toggleDrawer('drawer-usuarios')" class="text-gray-400 hover:text-gray-600 font-bold p-1 hover:bg-gray-100 text-lg cursor-pointer">✕</button>
        </div>
        <div class="flex border-b border-gray-200 mb-4 text-xs font-bold uppercase">
            <button id="tab-btn-form" onclick="cambiarPestanaInterna('form')" class="flex-1 py-2 text-center border-b-2 border-slate-800 text-slate-800 cursor-pointer">📝 Registrar</button>
            <button id="tab-btn-trash" onclick="cambiarPestanaInterna('trash')" class="flex-1 py-2 text-center border-b-2 border-transparent text-gray-400 hover:text-gray-600 cursor-pointer">🗑️ Papelera</button>
        </div>

        <div id="contenido-tab-form" class="space-y-3 flex-1 overflow-y-auto pr-1">
            <div><label class="block text-[10px] font-bold text-gray-500 uppercase">Cédula</label><input type="text" id="manual-cedula" class="w-full mt-1 p-2 border border-gray-200 rounded-lg text-xs bg-slate-50"></div>
            <div><label class="block text-[10px] font-bold text-gray-500 uppercase">Nombre Completo</label><input type="text" id="manual-nombre" class="w-full mt-1 p-2 border border-gray-200 rounded-lg text-xs"></div>
            <div class="grid grid-cols-2 gap-2">
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">Status</label><input type="text" id="manual-status" class="w-full mt-1 p-2 border border-gray-200 rounded-lg text-xs"></div>
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">Serial</label><input type="text" id="manual-serial" class="w-full mt-1 p-2 border border-gray-200 rounded-lg text-xs"></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">Status Factura</label><input type="text" id="manual-stf" class="w-full mt-1 p-2 border border-gray-200 rounded-lg text-xs"></div>
                <div><label class="block text-[10px] font-bold text-gray-500 uppercase">Fecha</label><input type="date" id="manual-fecha" class="w-full mt-1 p-2 border border-gray-200 rounded-lg text-xs"></div>
            </div>
            <div class="flex items-center gap-2 py-2 bg-slate-50 p-2 rounded-lg border border-slate-100">
                <input type="checkbox" id="manual-pago" class="w-4 h-4 cursor-pointer"><label for="manual-pago" class="text-xs font-semibold text-gray-700 cursor-pointer">¿Ya pagó?</label>
            </div>
            <button onclick="guardarPersonaManual()" class="w-full bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold py-2.5 rounded-lg uppercase cursor-pointer transition">💾 Guardar</button>
        </div>

        <div id="contenido-tab-trash" class="hidden flex-1 flex flex-col justify-between overflow-hidden">
            <div id="lista-papelera" class="flex-1 overflow-y-auto space-y-2 pr-1 text-xs font-mono"></div>
            <div class="border-t pt-3 mt-3"><button onclick="vaciarPapeleraPorCompleto()" class="w-full bg-rose-50 text-rose-600 text-[11px] font-bold py-2 rounded-lg border border-rose-200 transition cursor-pointer">🚨 Vaciar Definitivamente</button></div>
        </div>
    </div>

    <div id="drawer-comparar" class="fixed top-0 left-0 h-full w-full sm:w-105 bg-white z-50 shadow-2xl -translate-x-full transition-transform duration-300 overflow-y-auto border-r border-slate-100 p-6 flex flex-col">
        <div class="flex justify-between items-center border-b pb-4 mb-4"><h2 class="text-xl font-extrabold text-purple-900">⚖️ Comparador</h2><button onclick="toggleDrawer('drawer-comparar')" class="text-gray-400 hover:text-gray-600 font-bold p-1 text-lg cursor-pointer">✕</button></div>
        <div class="space-y-4 mb-4">
            <input type="file" id="excel-comp-a" accept=".xlsx, .xls" class="mt-1 block text-xs" /><p id="label-comp-a" class="text-xs font-semibold text-purple-700 truncate"></p>
            <input type="file" id="excel-comp-b" accept=".xlsx, .xls" class="mt-1 block text-xs" /><p id="label-comp-b" class="text-xs font-semibold text-purple-700 truncate"></p>
        </div>
        <button onclick="ejecutarComparacionIndependiente()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2.5 rounded-lg text-xs uppercase cursor-pointer transition">🔍 Comparar</button>
        <div id="resultados-comparacion" class="mt-4 text-xs font-mono"></div>
    </div>

    <div id="drawer-importar" class="fixed top-0 right-0 h-full w-full sm:w-96 bg-white z-50 shadow-2xl translate-x-full transition-transform duration-300 overflow-y-auto border-l border-slate-100 p-6 flex flex-col justify-between">
        <div>
            <div class="flex justify-between items-center border-b pb-4 mb-6"><h2 class="text-xl font-extrabold text-indigo-900">📂 Importación</h2><button onclick="toggleDrawer('drawer-importar')" class="text-gray-400 hover:text-gray-600 font-bold p-1 text-lg cursor-pointer">✕</button></div>
            <input type="file" id="input-excel" accept=".xlsx, .xls" class="block w-full text-xs" />
            <div id="info-archivo" class="mt-3 p-2 bg-slate-50 rounded text-[11px] font-mono"></div>
            <div class="space-y-3 mt-4">
                <button onclick="procesarYGuardarTodo()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg text-xs uppercase cursor-pointer">📥 Cargar a DB</button>
                <button onclick="exportarBaseDatos()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-xs uppercase cursor-pointer">📤 Exportar DB</button>
            </div>
        </div>
        <button onclick="limpiarTodaLaDB()" class="w-full bg-rose-50 text-rose-600 border border-rose-200 py-2 rounded-lg text-xs font-bold transition cursor-pointer">🗑️ Vaciar DB</button>
    </div>

    <div class="container mx-auto p-6 max-w-7xl">
        <h1 class="text-3xl font-extrabold text-indigo-900 mb-6 text-center">Sistema Local de Gestión de Facturas</h1>
        <div id="zona-alerta" class="max-w-md mx-auto"></div>

        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
                <div><h2 class="text-xl font-bold text-slate-700">📋 Registros Guardados</h2></div>
                <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-xl border border-slate-200">
                    <span class="text-xs font-bold text-slate-600">⚠️ Modo Eliminación</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="switch-modo-borrar" class="sr-only peer" onchange="alternarVisibilidadBorrado()">
                        <div class="w-10 h-6 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-rose-600"></div>
                    </label>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-indigo-900 text-white text-xs uppercase">
                            <th class="p-4">Cédula</th><th class="p-4">Nombre Completo</th><th class="p-4">Status</th><th class="p-4">Serial</th><th class="p-4">Status Factura</th><th class="p-4">Fecha</th><th class="p-4 text-center">¿Pagó?</th><th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-registros" class="divide-y divide-gray-200 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/excel.js"></script>
    <script src="js/interfaz.js"></script>

    <script>
  // Este comando le dice a Lucide que busque todos los iconos en el HTML y los dibuje
  lucide.createIcons();
</script>
    
</body>
</html>
