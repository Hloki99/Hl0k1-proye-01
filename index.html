<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Local de Gestión de Facturas</title>
    
    <!-- Tailwind CSS para el diseño rápido y responsivo -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Hoja de estilos personalizada para animaciones y detalles del scroll -->
    <link rel="stylesheet" href="css/estilos.css">
    
    <!-- SheetJS para la exportación e importación nativa de Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <!-- Encabezado de la Aplicación -->
    <header class="bg-indigo-600 text-white shadow-md px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <span class="text-3xl">📄</span>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Gestor de Facturas Pro</h1>
                <p class="text-xs text-indigo-200">Almacenamiento Local Seguro (IndexedDB)</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="btn-importar-excel" class="bg-indigo-700 hover:bg-indigo-800 text-white font-medium py-2 px-4 rounded-lg text-sm transition-all flex items-center gap-2 cursor-pointer shadow-sm">
                <span>📥</span> Importar Excel
            </button>
            <button id="btn-exportar-excel" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition-all flex items-center gap-2 cursor-pointer shadow-sm">
                <span>📤</span> Exportar Excel
            </button>
            <input type="file" id="input-archivo-excel" class="hidden" accept=".xlsx, .xls">
        </div>
    </header>

    <!-- Contenedor Principal / Panel de Trabajo -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Formulario de Registro (Columna Izquierda en pantallas grandes) -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 h-fit">
            <h2 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-3 mb-4 flex items-center gap-2">
                <span>📝</span> Registrar Nueva Factura
            </h2>
            <form id="form-factura" class="space-y-4">
                <div>
                    <label for="input-cliente" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Nombre del Cliente</label>
                    <input type="text" id="input-cliente" required class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-indigo-500 focus:bg-white transition-all" placeholder="Ej. Juan Pérez">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label for="input-fecha" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Fecha Emisión</label>
                        <input type="date" id="input-fecha" required class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-indigo-500 focus:bg-white transition-all">
                    </div>
                    <div>
                        <label for="input-monto" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Monto Total ($)</label>
                        <input type="number" id="input-monto" step="0.01" required class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-indigo-500 focus:bg-white transition-all" placeholder="0.00">
                    </div>
                </div>
                <div>
                    <label for="select-estado" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Estado de la Factura</label>
                    <select id="select-estado" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:border-indigo-500 focus:bg-white transition-all cursor-pointer">
                        <option value="Pagada">✅ Pagada</option>
                        <option value="Pendiente">⏳ Pendiente</option>
                        <option value="Anulada">❌ Anulada</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-all shadow-md mt-2 cursor-pointer flex justify-center items-center gap-2">
                    <span>💾</span> Guardar Factura
                </button>
            </form>
        </section>

        <!-- Listado y Tabla de Facturas (Columna Derecha / Ocupa 2 columnas) -->
        <section class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col min-h-[400px]">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b border-slate-100 pb-3 mb-4 w-full">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                    <span>📋</span> Historial de Facturas
                </h2>
                <!-- Buscador rápido en tiempo real -->
                <div class="relative w-full sm:w-64">
                    <input type="text" id="input-buscar" class="w-full bg-slate-50 border border-slate-300 rounded-lg pl-8 pr-3 py-1.5 text-xs focus:border-indigo-500 focus:bg-white transition-all" placeholder="Buscar por cliente...">
                    <span class="absolute left-2.5 top-2 text-xs text-slate-400">🔍</span>
                </div>
            </div>

            <!-- Tabla Responsiva con Scrollbar optimizado -->
            <div class="flex-1 overflow-x-auto border border-slate-100 rounded-lg">
                <table class="w-full text-left border-collapse min-w-[500px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Cliente</th>
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Fecha</th>
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Monto</th>
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Estado</th>
                            <th class="p-3 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo-facturas" class="divide-y divide-slate-100 text-sm">
                        <!-- Las facturas de IndexedDB se inyectarán de forma dinámica aquí -->
                    </tbody>
                </table>
                <!-- Mensaje cuando la tabla esté vacía -->
                <div id="mensaje-vacio" class="hidden text-center py-12 text-slate-400">
                    <span class="text-4xl block mb-2">📂</span>
                    No hay facturas registradas en este momento.
                </div>
            </div>
        </section>
    </main>

    <!-- Pie de página informativo -->
    <footer class="bg-slate-900 text-slate-400 text-center py-4 text-xs border-t border-slate-800">
        &copy; 2026 - Sistema de Gestión Local Ejecutado Seguro desde GitHub Pages.
    </footer>

    <!-- Scripts del núcleo de la aplicación -->
    <script src="js/logica.js"></script>
</body>
</html>
